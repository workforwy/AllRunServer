server:
  port: 8080

spring:
  application:
    name: allrun-server
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true
    baseline-on-migrate: true

app:
  upload-dir: ${UPLOAD_DIR:./uploads}
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:allrun-dev-secret-change-in-production-must-be-at-least-256-bits}
    expiration-ms: 86400000
  apk:
    version: "9.0"
    change-log: "增加了二维码扫描功能\n修改了某些机型登录失败问题"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
